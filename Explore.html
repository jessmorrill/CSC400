<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Explore Mode - Shape Explorer</title>
    <link rel="stylesheet" href="Style.css">
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
</head>
<body class="ar-body" data-page="explore">

    <div id="ar-container"></div>

    <button id="btn-back" class="ar-ui">&larr; Back</button>

    <!-- K-4 only. Untouched. -->
    <button id="btn-texture-toggle" class="ar-ui">Show Object</button>

    <!-- 5-6 only. Two separate buttons, two separate toggles. -->
    <button id="btn-skeleton-toggle" class="ar-ui grade56-ui">Show Skeleton</button>
    <button id="btn-net-toggle" class="ar-ui grade56-ui">Show Net</button>

    <div id="skeleton-note" class="ar-ui skeleton-note" hidden></div>

    <div class="ar-ui shape-nav">
        <button class="arrow-btn" onclick="changeShape(-1)">&#8592;</button>
        <div id="shape-label">Cone</div>
        <button class="arrow-btn" onclick="changeShape(1)">&#8594;</button>
    </div>

    <script src="shapes-data.js"></script>
    <script src="App.js"></script>
</body>
</html>
