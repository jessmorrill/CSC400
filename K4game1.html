<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Shape Quiz - Shape Explorer</title>
    <link rel="stylesheet" href="Style.css" />
    <style>
        /* ---------- Shape Quiz page ---------- */
        body[data-page="k4"] .page {
            padding-top: 20px;
        }

        .mode-toggle-row {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 460px;
            margin: 0 auto 16px;
        }

        .mode-toggle-btn {
            flex: 1;
            border: none;
            border-radius: 14px;
            padding: 12px 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.65);
            color: #1f2937;
            transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
        }

        .mode-toggle-btn:active {
            transform: translateY(2px);
        }

        .mode-toggle-btn.active {
            background: #ffffff;
            color: #2b6cb0;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.15);
        }

        .quiz-card {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            background: white;
            color: #1f2937;
            border-radius: 22px;
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.15);
            padding: 22px 22px 26px;
            text-align: center;
        }

        .quiz-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 6px;
        }

        .quiz-progress {
            font-weight: 700;
            color: #64748b;
            font-size: 14px;
        }

        .repeat-btn {
            border: none;
            background: #eef2ff;
            color: #2b6cb0;
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s ease, transform 0.1s ease;
        }

        .repeat-btn:active {
            transform: translateY(1px);
        }

        .repeat-btn.playing {
            background: #dbe4ff;
        }

        .quiz-prompt {
            font-size: 22px;
            font-weight: 800;
            margin: 10px 0 18px;
            color: #1f2937;
        }

        /* single-shape "identify" layout */
        .quiz-shape-stage {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }

        .quiz-shape-stage svg {
            width: 150px;
            height: 150px;
        }

        .name-choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 22px;
        }

        .name-choice-btn {
            border: 3px solid transparent;
            background: #f8fafc;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            cursor: pointer;
            transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
        }

        .name-choice-btn:active {
            transform: translateY(2px);
        }

        .name-choice-btn.selected {
            border-color: #2b6cb0;
            background: #eaf2fb;
        }

        /* two-image "select the shape" layout */
        .image-choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 22px;
        }

        .image-choice-btn {
            border: 4px solid transparent;
            background: #f8fafc;
            border-radius: 18px;
            padding: 14px 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
        }

        .image-choice-btn:active {
            transform: translateY(2px);
        }

        .image-choice-btn svg {
            width: 110px;
            height: 110px;
        }

        .image-choice-btn.selected {
            border-color: #2b6cb0;
            background: #eaf2fb;
        }

        .quiz-nav-row {
            display: flex;
            gap: 12px;
        }

        .quiz-nav-row .big-button {
            font-size: 16px;
            min-height: 50px;
            padding: 12px 16px;
        }

        #btn-quiz-back {
            flex: 1;
        }

        #btn-quiz-next {
            flex: 2;
            background: #cbd5e1;
            color: #475569;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.12);
        }

        #btn-quiz-next.ready {
            background: #22c55e;
            color: white;
        }

        #btn-quiz-back:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        /* results screen */
        .results-score {
            font-size: 40px;
            font-weight: 800;
            margin: 6px 0 4px;
            color: #16a34a;
        }

        .results-caption {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 20px;
        }

        .results-list {
            text-align: left;
            list-style: none;
            padding: 0;
            margin: 0 0 22px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .results-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #f8fafc;
        }

        .results-list li.correct {
            background: #ecfdf5;
        }

        .results-list li.incorrect {
            background: #fef2f2;
        }

        .results-icon {
            font-size: 18px;
            flex-shrink: 0;
        }

        @media (max-width: 380px) {
            .quiz-prompt {
                font-size: 19px;
            }

            .quiz-shape-stage svg {
                width: 120px;
                height: 120px;
            }

            .image-choice-btn svg {
                width: 90px;
                height: 90px;
            }
        }
    </style>
</head>
<body data-page="k4" data-grade="k4">
    <nav id="navbar"></nav>

    <main class="page">
        <h1>Shape Quiz</h1>

        <div class="mode-toggle-row">
            <button id="btn-mode-match" class="mode-toggle-btn active" type="button">Shape Match</button>
            <button id="btn-mode-property" class="mode-toggle-btn" type="button">Property Quiz</button>
        </div>

        <div class="quiz-card">
            <!-- Quiz question view -->
            <div id="quiz-question-view">
                <div class="quiz-topbar">
                    <span class="quiz-progress" id="quiz-progress">Question 1 of 12</span>
                    <button id="btn-repeat-audio" class="repeat-btn" type="button" aria-label="Repeat the question">
                        🔊 <span>Repeat</span>
                    </button>
                </div>

                <h2 class="quiz-prompt" id="quiz-prompt">What shape is this?</h2>

                <!-- filled in by JS: either .quiz-shape-stage + .name-choices,
                     or .image-choices, depending on question type -->
                <div id="quiz-answer-area"></div>

                <div class="quiz-nav-row">
                    <button id="btn-quiz-back" class="big-button secondary" type="button">&larr; Back</button>
                    <button id="btn-quiz-next" class="big-button" type="button" disabled>Next</button>
                </div>
            </div>

            <!-- Results view (hidden until the quiz is submitted) -->
            <div id="quiz-results-view" style="display:none;">
                <h2 style="margin-top:0;">Quiz Complete!</h2>
                <div class="results-score" id="results-score">0 / 12</div>
                <p class="results-caption">Here's how you did:</p>
                <ul class="results-list" id="results-list"></ul>
                <div class="button-stack" style="margin: 0 auto;">
                    <button id="btn-play-again" class="big-button" type="button">Play Again</button>
                    <a class="big-button secondary" href="K4.html">Back to K-4 Menu</a>
                </div>
            </div>
        </div>
    </main>

<script src="App.js"></script>
    <script>

        const SHAPE_INFO = {
            cone: {
                name: 'Cone',
                color: '#e74c3c',
                nameAudio: 'audio/cone.mp3',
                svg: (c) => `
                    <ellipse cx="70" cy="115" rx="45" ry="14" fill="${c}" fill-opacity="0.15" stroke="${c}" stroke-width="3"/>
                    <path d="M25,115 L70,20 L115,115" fill="none" stroke="${c}" stroke-width="3" stroke-linejoin="round"/>
                `
            },
            sphere: {
                name: 'Sphere',
                color: '#3498db',
                nameAudio: 'audio/sphere.mp3',
                svg: (c) => `
                    <circle cx="70" cy="70" r="45" fill="${c}" fill-opacity="0.15" stroke="${c}" stroke-width="3"/>
                    <ellipse cx="70" cy="70" rx="45" ry="14" fill="none" stroke="${c}" stroke-width="2" stroke-opacity="0.6"/>
                    <ellipse cx="70" cy="70" rx="14" ry="45" fill="none" stroke="${c}" stroke-width="2" stroke-opacity="0.6"/>
                `
            },
            cube: {
                name: 'Cube',
                color: '#2ecc71',
                nameAudio: 'audio/cube.mp3',
                svg: (c) => `
                    <polygon points="35,55 85,55 110,30 60,30" fill="${c}" fill-opacity="0.28" stroke="${c}" stroke-width="3" stroke-linejoin="round"/>
                    <polygon points="85,55 110,30 110,80 85,105" fill="${c}" fill-opacity="0.18" stroke="${c}" stroke-width="3" stroke-linejoin="round"/>
                    <rect x="35" y="55" width="50" height="50" fill="${c}" fill-opacity="0.1" stroke="${c}" stroke-width="3"/>
                `
            },
            cylinder: {
                name: 'Cylinder',
                color: '#06b6d4',
                nameAudio: 'audio/cylinder.mp3',
                svg: (c) => `
                    <line x1="25" y1="35" x2="25" y2="115" stroke="${c}" stroke-width="3"/>
                    <line x1="115" y1="35" x2="115" y2="115" stroke="${c}" stroke-width="3"/>
                    <rect x="25" y="35" width="90" height="80" fill="${c}" fill-opacity="0.12" stroke="none"/>
                    <ellipse cx="70" cy="115" rx="45" ry="14" fill="${c}" fill-opacity="0.2" stroke="${c}" stroke-width="3"/>
                    <ellipse cx="70" cy="35" rx="45" ry="14" fill="${c}" fill-opacity="0.2" stroke="${c}" stroke-width="3"/>
                `
            },
            pyramid: {
                name: 'Pyramid',
                color: '#f1c40f',
                nameAudio: 'audio/pyramid.mp3',
                svg: (c) => `
                    <polygon points="35,100 85,100 110,75 60,75" fill="${c}" fill-opacity="0.2" stroke="${c}" stroke-width="3" stroke-linejoin="round"/>
                    <path d="M72,25 L35,100 M72,25 L85,100 M72,25 L110,75 M72,25 L60,75" fill="none" stroke="${c}" stroke-width="3" stroke-linecap="round"/>
                `
            },
            prism: {
                name: 'Triangular Prism',
                color: '#9b59b6',
                nameAudio: 'audio/prism.mp3',
                svg: (c) => `
                    <polygon points="35,110 85,110 60,55" fill="${c}" fill-opacity="0.2" stroke="${c}" stroke-width="3" stroke-linejoin="round"/>
                    <polygon points="60,90 110,90 85,35" fill="${c}" fill-opacity="0.12" stroke="${c}" stroke-width="3" stroke-linejoin="round"/>
                    <path d="M35,110 L60,90 M85,110 L110,90 M60,55 L85,35" fill="none" stroke="${c}" stroke-width="3" stroke-linecap="round"/>
                `
            }
        };

        function shapeSvgMarkup(slug) {
            const info = SHAPE_INFO[slug];
            return `<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">${info.svg(info.color)}</svg>`;
        }


        const MATCH_QUESTIONS = [
            { type: 'identify', shape: 'cone', promptText: 'What shape is this?', audio: 'audio/whatShapeIsThis.mp3', choices: ['cone', 'sphere', 'pyramid'] },
            { type: 'select', shape: 'sphere', promptText: 'Which of these pictures is a sphere?', audio: 'audio/selectSphere.mp3', options: ['sphere', 'cube'] },
            { type: 'identify', shape: 'cube', promptText: 'What shape is this?', audio: 'audio/whatShapeIsThis.mp3', choices: ['cube', 'cylinder', 'prism'] },
            { type: 'select', shape: 'cylinder', promptText: 'Which of these pictures is a cylinder?', audio: 'audio/selectCylinder.mp3', options: ['cylinder', 'pyramid'] },
            { type: 'identify', shape: 'pyramid', promptText: 'What shape is this?', audio: 'audio/whatShapeIsThis.mp3', choices: ['pyramid', 'cone', 'cube'] },
            { type: 'select', shape: 'prism', promptText: 'Which of these pictures is a triangular prism?', audio: 'audio/selectPrism.mp3', options: ['prism', 'cone'] },
            { type: 'select', shape: 'cone', promptText: 'Which of these pictures is a cone?', audio: 'audio/selectCone.mp3', options: ['cone', 'cylinder'] },
            { type: 'identify', shape: 'sphere', promptText: 'What shape is this?', audio: 'audio/whatShapeIsThis.mp3', choices: ['sphere', 'cylinder', 'prism'] },
            { type: 'select', shape: 'cube', promptText: 'Which of these pictures is a cube?', audio: 'audio/selectCube.mp3', options: ['cube', 'prism'] },
            { type: 'identify', shape: 'cylinder', promptText: 'What shape is this?', audio: 'audio/whatShapeIsThis.mp3', choices: ['cylinder', 'cube', 'cone'] },
            { type: 'select', shape: 'pyramid', promptText: 'Which of these pictures is a pyramid?', audio: 'audio/selectPyramid.mp3', options: ['pyramid', 'sphere'] },
            { type: 'identify', shape: 'prism', promptText: 'What shape is this?', audio: 'audio/whatShapeIsThis.mp3', choices: ['prism', 'pyramid', 'sphere'] }
        ];

        const PROPERTY_QUESTIONS = [
            { type: 'select', shape: 'sphere', promptText: 'What shape is round like a ball and can roll down a hill?', audio: 'audio/rollDownHill.mp3', options: ['sphere', 'cube'] },
            { type: 'select', shape: 'cube', promptText: 'Which shape looks like a box and has 6 sides?', audio: 'audio/sixFlatFaces.mp3', options: ['cube', 'sphere'] },
            { type: 'select', shape: 'cone', promptText: 'Which shape has a flat circle bottom and a pointy tip like an ice cream cone?', audio: 'audio/onePointyTip.mp3', options: ['cone', 'cylinder'] },
            { type: 'select', shape: 'cylinder', promptText: 'Which shape looks like a soup can, has 2 flat circle faces, and can roll on its curved side?', audio: 'audio/twoFlatCircles.mp3', options: ['cylinder', 'cube'] },
            { type: 'select', shape: 'pyramid', promptText: 'Which shape has 4 triangle sides that meet at a sharp point at the top?', audio: 'audio/pointyTriangleSides.mp3', options: ['pyramid', 'prism'] },
            { type: 'select', shape: 'prism', promptText: 'Which shape looks like a camping tent, with two triangle ends and rectangles between them?', audio: 'audio/triangleEnds.mp3', options: ['prism', 'pyramid'] }
        ];

        const QUESTION_BANKS = {
            match: MATCH_QUESTIONS,
            property: PROPERTY_QUESTIONS
        };

        function shuffle(list) {
            const copy = list.slice();
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        // Setup mutable state variables
        let currentMode = 'match';
        let activeQuestions = [];
        let currentIndex = 0;
        let answers = [];

        let activeAudio = null;
        let activeAudioKey = null;

        function startQuiz(mode) {
            currentMode = mode;
            
            activeQuestions = shuffle(QUESTION_BANKS[currentMode]);
            
            currentIndex = 0;
            answers = new Array(activeQuestions.length).fill(null);
            
            if (activeAudio) {
                activeAudio.pause();
                activeAudio = null;
                activeAudioKey = null;
            }

            document.getElementById('quiz-results-view').style.display = 'none';
            document.getElementById('quiz-question-view').style.display = 'block';
            

            render();
        }

        function playAudio(src, key, onDone) {
            if (activeAudio && activeAudioKey === key) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
                activeAudio = null;
                activeAudioKey = null;
                if (onDone) onDone();
                return;
            }
            if (activeAudio) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
            }

            const audio = new Audio(src);
            activeAudio = audio;
            activeAudioKey = key;

            const clearIfCurrent = () => {
                if (activeAudio === audio) {
                    activeAudio = null;
                    activeAudioKey = null;
                }
                if (onDone) onDone();
            };

            audio.addEventListener('ended', clearIfCurrent);
            audio.addEventListener('error', clearIfCurrent);
            audio.play().catch(clearIfCurrent);
        }

        function playQuestionAudio(question, { forceRestart } = {}) {
            const repeatBtn = document.getElementById('btn-repeat-audio');
            if (forceRestart && activeAudio) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
                activeAudio = null;
                activeAudioKey = null;
            }
            repeatBtn.classList.add('playing');
            playAudio(question.audio, 'question-audio', () => repeatBtn.classList.remove('playing'));
        }

        function render() {
            const question = activeQuestions[currentIndex];
            document.getElementById('quiz-progress').textContent = `Question ${currentIndex + 1} of ${activeQuestions.length}`;
            document.getElementById('quiz-prompt').textContent = question.promptText;

            const answerArea = document.getElementById('quiz-answer-area');
            const selected = answers[currentIndex];

            if (question.type === 'identify') {
                answerArea.innerHTML = `
                    <div class="quiz-shape-stage">${shapeSvgMarkup(question.shape)}</div>
                    <div class="name-choices">
                        ${question.choices.map(slug => `
                            <button type="button" class="name-choice-btn${selected === slug ? ' selected' : ''}" data-slug="${slug}">
                                ${SHAPE_INFO[slug].name}
                            </button>
                        `).join('')}
                    </div>
                `;
                answerArea.querySelectorAll('.name-choice-btn').forEach(btn => {
                    btn.addEventListener('click', () => selectAnswer(btn.dataset.slug, btn, question));
                });
            } else {
                answerArea.innerHTML = `
                    <div class="image-choices">
                        ${question.options.map(slug => `
                            <button type="button" class="image-choice-btn${selected === slug ? ' selected' : ''}" data-slug="${slug}" aria-label="shape option">
                                ${shapeSvgMarkup(slug)}
                            </button>
                        `).join('')}
                    </div>
                `;
                answerArea.querySelectorAll('.image-choice-btn').forEach(btn => {
                    btn.addEventListener('click', () => selectAnswer(btn.dataset.slug, btn, question));
                });
            }

            document.getElementById('btn-quiz-back').disabled = currentIndex === 0;
            const nextBtn = document.getElementById('btn-quiz-next');
            nextBtn.textContent = currentIndex === activeQuestions.length - 1 ? 'Submit' : 'Next';
            nextBtn.classList.toggle('ready', !!selected);
            nextBtn.disabled = !selected;

            playQuestionAudio(question, { forceRestart: true });
        }

        function selectAnswer(slug, buttonEl, question) {
            answers[currentIndex] = slug;

            buttonEl.parentElement.querySelectorAll('button').forEach(btn => btn.classList.remove('selected'));
            buttonEl.classList.add('selected');

            const nextBtn = document.getElementById('btn-quiz-next');
            nextBtn.classList.add('ready');
            nextBtn.disabled = false;

            if (question.type === 'identify') {
                playAudio(SHAPE_INFO[slug].nameAudio, `answer-${slug}`);
            }
        }

        function goBack() {
            if (currentIndex === 0) return;
            currentIndex -= 1;
            render();
        }

        function goNext() {
            if (!answers[currentIndex]) return;
            if (currentIndex === activeQuestions.length - 1) {
                showResults();
                return;
            }
            currentIndex += 1;
            render();
        }

        function showResults() {
            if (activeAudio) {
                activeAudio.pause();
                activeAudio = null;
                activeAudioKey = null;
            }

            let score = 0;
            const list = document.getElementById('results-list');
            list.innerHTML = activeQuestions.map((question, index) => {
                const isCorrect = answers[index] === question.shape;
                if (isCorrect) score += 1;
                const label = question.type === 'identify'
                    ? `Question ${index + 1}: ${SHAPE_INFO[question.shape].name}`
                    : `Question ${index + 1}: ${question.promptText}`;
                return `
                    <li class="${isCorrect ? 'correct' : 'incorrect'}">
                        <span>${label}${isCorrect ? '' : ` — you picked ${SHAPE_INFO[answers[index]]?.name || 'nothing'}`}</span>
                    </li>
                `;
            }).join('');

            document.getElementById('results-score').textContent = `${score} / ${activeQuestions.length}`;
            document.getElementById('quiz-question-view').style.display = 'none';
            document.getElementById('quiz-results-view').style.display = 'block';
        }

        function changeMode(mode) {
            if (mode === currentMode) return;
            document.getElementById('btn-mode-match').classList.toggle('active', mode === 'match');
            document.getElementById('btn-mode-property').classList.toggle('active', mode === 'property');
            startQuiz(mode);
        }

        // Attach layout actions safely
        document.getElementById('btn-mode-match').addEventListener('click', () => changeMode('match'));
        document.getElementById('btn-mode-property').addEventListener('click', () => changeMode('property'));

        document.getElementById('btn-quiz-back').addEventListener('click', goBack);
        document.getElementById('btn-quiz-next').addEventListener('click', goNext);
        document.getElementById('btn-play-again').addEventListener('click', () => startQuiz(currentMode));
        document.getElementById('btn-repeat-audio').addEventListener('click', () => {
            playQuestionAudio(activeQuestions[currentIndex], { forceRestart: true });
        });

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof renderNavbar === 'function') renderNavbar();
            startQuiz('match');
        });
    </script>
</body>
</html>
