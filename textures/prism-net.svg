<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <style>
    .rectBase { fill: #9b59b6; fill-opacity: 0.55; }
    .rectRoof { fill: #7e3fb0; fill-opacity: 0.55; }
    .tri      { fill: #b983dc; fill-opacity: 0.55; }
    .cut      { fill: none; stroke: #3b215a; stroke-width: 5; stroke-linejoin: round; }
    .fold     { stroke: #3b215a; stroke-width: 2.5; stroke-dasharray: 8 6; opacity: 0.8; }
  </style>

  <!-- Scaled exactly to buildPrismGroup()'s defaults
       (length: 1.65, halfBase: 0.52, height: 0.82):
       base edge (front-back) = 2*0.52 = 1.04 units  -> wider middle rectangle
       slant edge (roof side) = sqrt(0.52^2+0.82^2) = 0.9710 units -> two side rectangles
       prism length            = 1.65 units          -> shared rectangle height
       triangle base = 1.04, triangle height = 0.82 units
       At 109.09 px/unit: rect height=180px, base width=113.45px,
       roof width=105.92px each, triangle height=89.45px -->

  <rect class="rectRoof" x="93.35"  y="166" width="105.92" height="180"/>
  <rect class="rectBase" x="199.27" y="166" width="113.45" height="180"/>
  <rect class="rectRoof" x="312.73" y="166" width="105.92" height="180"/>

  <polygon class="tri" points="199.27,166 312.73,166 256,76.55"/>
  <polygon class="tri" points="199.27,346 312.73,346 256,435.45"/>

  <path class="cut" d="
    M256,76.55 L312.73,166 L418.65,166 L418.65,346 L312.73,346
    L256,435.45 L199.27,346 L93.35,346 L93.35,166 L199.27,166 Z" />

  <line class="fold" x1="199.27" y1="166" x2="199.27" y2="346"/>
  <line class="fold" x1="312.73" y1="166" x2="312.73" y2="346"/>
  <line class="fold" x1="199.27" y1="166" x2="312.73" y2="166"/>
  <line class="fold" x1="199.27" y1="346" x2="312.73" y2="346"/>
</svg>
