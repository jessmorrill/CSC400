<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <style>
    .base   { fill: #e74c3c; fill-opacity: 0.55; stroke: #7f1d1d; stroke-width: 5; }
    .sector { fill: #f47862; fill-opacity: 0.55; stroke: #7f1d1d; stroke-width: 5; stroke-linejoin: round; }
  </style>

  <!-- Scaled exactly to the model (radiusBottom: 0.5, height: 1):
       slant height l = sqrt(0.5^2 + 1^2) = 1.11803 units
       sector angle = (r/l)*360 = 160.997 degrees
       At 140 px/unit: r=70px, l=156.52px
       Laid out in the standard textbook style: the sector "fan"
       on top with its curved edge facing down, and the base circle
       sitting directly beneath it, tangent at a single point where
       the two would meet when rolled into the cone. -->

  <!-- curved lateral surface, unrolled into a 160.997° sector -->
  <path class="sector" d="M256,90 L410.38,115.84 A156.52,156.52 0 0,1 101.62,115.84 Z"/>

  <!-- circular base, tangent to the bottom of the sector's arc -->
  <circle class="base" cx="256" cy="316.52" r="70"/>
</svg>
